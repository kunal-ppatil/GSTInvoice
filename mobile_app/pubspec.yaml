name: invoiscope_mobile
description: InvoiScope GST SmartScan Mobile Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation & State Management
  flutter_riverpod: ^2.3.6
  riverpod_annotation: ^2.1.1
  go_router: ^10.1.2

  # Networking & Async
  dio: ^5.3.2
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0

  # UI Components & Themes
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.5.0
  flutter_spinkit: ^5.2.0
  intl: ^0.18.1

  # Media Capture & Viewing
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  file_picker: ^8.0.0
  open_file: ^3.3.2

  # Charts & Visualization
  fl_chart: ^0.65.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.2.3
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - .env


  # Fonts are loaded via the google_fonts package (no local asset files needed)
